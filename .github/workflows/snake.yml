name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Generate snake animation
        uses: Platane/snk@v3
        with:
          github_user_name: daviemanuels
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?color_snake=00bfbf&color_dots=#161b22,#0e4429,#006d32,#26a641,#39d353&background=0d1117
            dist/github-contribution-grid-snake.gif?color_snake=00bfbf&background=0d1117

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
